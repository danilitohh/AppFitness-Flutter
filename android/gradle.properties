# Ajustes globales de Gradle para compilacion Android.
# Memoria JVM para builds Flutter/Android mas estables.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Habilita AndroidX (requerido por Flutter moderno).
android.useAndroidX=true
